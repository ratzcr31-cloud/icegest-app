<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IceGest - Gestão de Estoque</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="modo-escuro"> <button id="btnMenuMobile" class="btn-menu-mobile">☰</button>

    <div class="container-geral">
        
        <aside class="sidebar">
            <div class="logo">
                <h2>IceGest 🧊</h2>
            </div>
            <nav>
                <ul>
                    <li onclick="mostrarAba('dashboard')">📊 Dashboard</li>
                    <li onclick="mostrarAba('estoque')">📦 Estoque</li>
                    <li onclick="mostrarAba('aurora')">✨ Aurora IA</li>
                    <li onclick="mostrarAba('configuracoes')">⚙️ Configurações</li>
                    <li onclick="logout()" class="item-logout">🚪 Sair</li>
                </ul>
            </nav>
        </aside>

        <main class="conteudo-principal">
            
            <header class="cabecalho-sistema">
                <div class="acoes-topo">
                    <button id="btnExportar" class="btn-acao" onclick="abrirMenuExportar()">📤 Exportar ▼</button>
                    <div class="usuario-logado">
                        👤 <span id="nomeUsuarioDisplay">Ratz</span>
                    </div>
                </div>

                <div class="abas-navegacao">
                    <button class="aba-item ativa" onclick="filtrarPorSetor('Geral')">Geral</button>
                    <button class="aba-item" onclick="filtrarPorSetor('Loja')">Loja</button>
                    <button class="aba-item" onclick="filtrarPorSetor('Câmara Fria')">Câmara Fria</button>
                    <button class="aba-item" onclick="filtrarPorSetor('Estoque Seco')">Estoque</button>
                </div>
            </header>

            <section class="area-pesquisa-filtros">
                <div class="caixa-pesquisa">
                    <input type="text" id="pesquisaItem" oninput="filtrarTabela()" placeholder="🔍 Pesquisar item...">
                </div>
                
                <div class="caixa-filtros">
                    <select id="filtroCategoria" onchange="filtrarTabela()">
                        <option value="Todas">Filtro: Todas</option>
                        </select>
                    <select id="filtroStatus" onchange="filtrarTabela()">
                        <option value="Todos">Filtro de Status: Todos</option>
                        <option value="Normal">Normal</option>
                        <option value="Atencao">Em Atenção</option>
                        <option value="Vencido">Vencidos</option>
                    </select>
                </div>
            </section>

            <section class="sessao-tabela">
                <div class="tabela-responsiva">
                    <table id="tabelaEstoque">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="checkTodos" onclick="selecionarTodos()"></th>
                                <th>Item</th>
                                <th>Categoria</th>
                                <th>Estoque</th>
                                <th>Setor</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela">
                            </tbody>
                    </table>
                </div>
                
                <button class="btn-flutuante-add" onclick="abrirModal()">+</button>
            </section>

            <section id="abaAurora" class="aba-conteudo" style="display:none;">
                <div class="chat-container">
                    <div class="chat-header">
                        <h3>Assistente Aurora ✨</h3>
                        <button onclick="limparChatIA()" class="btn-limpar-chat">🗑️ Limpar</button>
                    </div>
                    <div id="chatHistorico" class="chat-mensagens">
                        </div>
                    <div class="chat-input-area">
                        <input type="text" id="inputChat" placeholder="Pergunte algo à Aurora...">
                        <button onclick="enviarMensagemIA()">🚀</button>
                    </div>
                </div>
            </section>

            <section id="abaConfiguracoes" class="aba-conteudo" style="display:none;">
                <div class="card-config">
                    <h3>Chave da Aurora (Gemini API)</h3>
                    <input type="text" id="inputApiKey" placeholder="Cole sua chave AIza..." autocomplete="off">
                    <button onclick="salvarConfiguracoes()" class="btn-salvar">Salvar Chave</button>
                </div>

                <div class="card-config">
                    <h3>Gerenciar Categorias</h3>
                    <div id="listaCategoriasConfig"></div>
                    <button onclick="addCategoria()" class="btn-add-config">+ Nova Categoria</button>
                </div>

                <div class="card-config">
                    <h3>Gerenciar Setores</h3>
                    <div id="listaSetoresConfig"></div>
                    <button onclick="addSetor()" class="btn-add-config">+ Novo Setor</button>
                </div>
            </section>

        </main>
    </div>

    <div id="modalItem" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h2 id="tituloModal">Cadastrar Produto</h2>
            <form id="formItem" onsubmit="salvarItem(event)">
                <input type="hidden" id="idItem">
                <input type="text" id="nomeItem" placeholder="Nome do Item" required>
                
                <div class="row">
                    <select id="categoriaItem" required></select>
                    <select id="setorItem" required></select>
                </div>

                <div class="row">
                    <input type="number" id="estoqueItem" placeholder="Qtd. Atual" required>
                    <input type="text" id="unidadeItem" placeholder="Unidade (ex: Kg, Un)" required>
                </div>

                <input type="date" id="validadeItem" required>
                <textarea id="obsItem" placeholder="Observações (opcional)"></textarea>
                
                <button type="submit" class="btn-submit">Salvar no Sistema</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>

</body>
</html>
